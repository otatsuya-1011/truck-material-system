<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>資材管理システム Pro</title>
<style>
:root{--navy:#102a43;--navy2:#1f4e78;--blue:#2f80ed;--bg:#eef3f8;--line:#d9e3ec;--green:#1f9d55;--red:#d64545;--muted:#6b7c93}
*{box-sizing:border-box} body{margin:0;font-family:Segoe UI,"Yu Gothic UI",Meiryo,sans-serif;background:var(--bg);color:#243447}
header{background:linear-gradient(135deg,var(--navy),var(--navy2),var(--blue));color:#fff;padding:20px}
.header{max-width:1150px;margin:auto;display:flex;align-items:center;gap:14px}
.logo{width:50px;height:50px;border-radius:14px;background:#fff;display:grid;place-items:center;font-size:25px}
h1{margin:0;font-size:25px} header p{margin:4px 0 0;opacity:.85;font-size:13px}
nav{max-width:1150px;margin:14px auto;padding:0 14px;display:flex;gap:8px;flex-wrap:wrap}
button{font:inherit;cursor:pointer;border:0;border-radius:9px;padding:10px 14px;font-weight:700}
.nav{background:#dfe8f1;color:var(--navy)} .nav.active,.primary{background:var(--navy2);color:#fff}
.secondary{background:#e7eef4;color:var(--navy)} .plus{background:#dff5e7;color:var(--green)} .minus{background:#fde6e6;color:var(--red)}
main{max-width:1150px;margin:auto;padding:0 14px 35px} .page{display:none} .page.active{display:block}
.card{background:#fff;border:1px solid var(--line);border-radius:15px;padding:17px;margin-bottom:15px;box-shadow:0 8px 24px rgba(16,42,67,.08)}
.grid{display:grid;gap:14px} .g4{grid-template-columns:repeat(4,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)}
.truck-card{cursor:pointer} .truck-card h3{margin:0;color:var(--navy)} .total{font-size:32px;font-weight:900;color:var(--navy2);margin-top:8px}
label{display:block;font-size:12px;font-weight:800;margin-bottom:6px;color:var(--navy)} input,select,textarea{width:100%;padding:10px;border:1px solid #cbd7e2;border-radius:9px;font:inherit}
table{width:100%;border-collapse:collapse;background:#fff} th,td{padding:11px;border-bottom:1px solid var(--line);text-align:left} th{background:var(--navy2);color:#fff}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px} .qty{font-weight:900;font-size:20px;text-align:center}
.actions{display:flex;gap:7px;flex-wrap:wrap} .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:end}
.status{padding:4px 8px;border-radius:999px;font-size:12px;font-weight:800} .ok{background:#e2f5e9;color:var(--green)} .low{background:#fde6e6;color:var(--red)}
.msg{padding:12px;border-radius:10px;margin-bottom:14px;display:none} .msg.show{display:block} .msg.info{background:#e8f2ff;color:#174ea6} .msg.error{background:#fde6e6;color:#a61b1b}
.loading{position:fixed;inset:0;background:rgba(255,255,255,.78);display:none;align-items:center;justify-content:center;z-index:99;font-weight:800;color:var(--navy)} .loading.show{display:flex}
.history-item{padding:12px;border-bottom:1px solid var(--line)} small{color:var(--muted)}
@media(max-width:800px){.g4{grid-template-columns:repeat(2,1fr)}.g3,.g2{grid-template-columns:1fr}}
@media(max-width:560px){.g4{grid-template-columns:1fr}nav{display:grid;grid-template-columns:1fr 1fr}}
@page{size:A4 landscape;margin:5mm}
@media print{
 header,nav,.no-print,#homePage,#transferPage,#setupPage,#historyPage{display:none!important}
 body,main{background:#fff;margin:0;padding:0} #managePage{display:block!important}
 .card{box-shadow:none;border:0;padding:0} .table-wrap{border:1px solid #000}
 th,td{padding:4px;border:1px solid #000;font-size:10pt} .actions{display:none}
}
</style>
</head>
<body>
<header><div class="header"><div class="logo">🚚</div><div><h1>資材管理システム Pro</h1><p>Googleスプレッドシート完全連携版</p></div></div></header>
<nav>
<button class="nav active" data-page="home" onclick="showPage('home')">ホーム</button>
<button class="nav" data-page="manage" onclick="showPage('manage')">資材管理</button>
<button class="nav" data-page="transfer" onclick="showPage('transfer')">資材移動</button>
<button class="nav" data-page="setup" onclick="showPage('setup')">初期数入力</button>
<button class="nav" data-page="add" onclick="showPage('add')">資材マスタ</button>
<button class="nav" data-page="history" onclick="showPage('history')">履歴</button>
</nav>
<main>
<div id="message" class="msg"></div>

<section id="homePage" class="page active">
<div class="card"><h2>号車別ダッシュボード</h2><div id="truckCards" class="grid g4"></div></div>
</section>

<section id="managePage" class="page">
<div class="card no-print">
<div class="grid g3">
<div><label>日付</label><input type="date" id="date"></div>
<div><label>号車</label><select id="truck"></select></div>
<div><label>担当者</label><input id="staff" placeholder="担当者名"></div>
</div>
</div>
<div class="card">
<div class="toolbar" style="justify-content:space-between"><h2 id="manageTitle">資材一覧</h2><button class="secondary no-print" onclick="window.print()">印刷</button></div>
<div class="table-wrap"><table><thead><tr><th>資材名</th><th>数量</th><th>増減</th><th>備考</th></tr></thead><tbody id="manageBody"></tbody></table></div>
</div>
</section>

<section id="transferPage" class="page">
<div class="card"><h2>資材移動</h2>
<div class="grid g2">
<div><label>移動元</label><select id="fromTruck"></select></div>
<div><label>移動先</label><select id="toTruck"></select></div>
<div><label>資材</label><select id="transferMaterial"></select></div>
<div><label>数量</label><input type="number" min="1" value="1" id="transferQty"></div>
<div><label>担当者</label><input id="transferStaff"></div>
<div><label>備考</label><input id="transferNote"></div>
</div><br><button class="primary" onclick="transfer()">移動する</button>
</div>
</section>

<section id="setupPage" class="page">
<div class="card"><h2>初期数入力</h2>
<div id="setupButtons" class="toolbar no-print"></div><br>
<h3 id="setupTitle"></h3>
<div class="table-wrap"><table><thead><tr><th>資材名</th><th>初期数</th><th>備考</th></tr></thead><tbody id="setupBody"></tbody></table></div>
<br><button class="primary" onclick="saveSetup()">この号車を保存</button>
</div>
</section>


<section id="addPage" class="page">
<div class="card">
<h2>資材マスタ</h2>
<p>資材の追加・削除を管理します。削除すると全号車から消えます。</p>
<div class="grid g2">
<div><label>新しい資材名</label><input id="newMaterial" placeholder="例：養生シート"></div>
<div><label>各号車の初期数</label><input type="number" id="newInitialQty" min="0" value="0"
onfocus="if(this.value==='0')this.value='';else this.select();"
onblur="if(this.value==='')this.value='0';"></div>
<div><label>担当者</label><input id="newMaterialStaff" placeholder="担当者名"></div>
<div><label>備考</label><input id="newMaterialNote" placeholder="任意"></div>
</div>
<br>
<button class="primary" onclick="addMaterial()">資材を追加する</button>
</div>

<div class="card">
<h2>登録済み資材</h2>
<div class="table-wrap">
<table>
<thead><tr><th>資材名</th><th>操作</th></tr></thead>
<tbody id="materialMasterBody"></tbody>
</table>
</div>
</div>
</section>

<section id="historyPage" class="page">
<div class="card">
  <div class="toolbar">
    <div>
      <label>号車</label>
      <select id="historyTruck"><option value="">すべて</option></select>
    </div>
    <div>
      <label>資材</label>
      <select id="historyMaterial"><option value="">すべて</option></select>
    </div>
    <button class="secondary" onclick="renderHistory()">絞り込み</button>
  </div>

  <div class="toolbar" style="justify-content:space-between;margin-top:16px;margin-bottom:12px">
    <h2 style="margin:0">更新履歴</h2>
    <div class="actions">
      <button class="minus" style="min-width:110px" onclick="deleteSelectedHistory()">選択削除</button>
      <button class="minus" style="min-width:130px" onclick="clearAllHistory()">履歴を全削除</button>
    </div>
  </div>

  <div id="historyList"></div>
</div>
</section>
</main>

<div id="loading" class="loading">スプレッドシートと通信中…</div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbyct0KZSyQwmGQL9HnDBbxvzpdGRcSCznVAuUxtz-JgXd8cK8EtsXafG30mlCsSUQWg/exec';
const trucks=["29号車","31号車","32号車","33号車"];
let materials=[];
let cloudData={}, historyData=[], setupTruck="29号車";

function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function esc(s){return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}
function loading(v){document.getElementById("loading").classList.toggle("show",v)}
function msg(text,type="info"){const e=document.getElementById("message");e.textContent=text;e.className=`msg show ${type}`;setTimeout(()=>e.className="msg",4000)}

async function apiGet(params=""){
 loading(true);
 try{
  const r=await fetch(API_URL+params,{cache:"no-store"});
  const j=await r.json();
  if(!j.success)throw new Error(j.message||"取得失敗");
  return j;
 }finally{loading(false)}
}
async function apiPost(payload){
 loading(true);
 try{
  const r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
  const j=await r.json();
  if(!j.success)throw new Error(j.message||"保存失敗");
  return j;
 }finally{loading(false)}
}
async function refresh(){
 try{
  const j=await apiGet("?action=getAll");
  materials=j.materials||[];
  cloudData=j.data||{};
  historyData=j.history||[];
  fillSelects();
  renderHome();
  renderManage();
  renderSetup();
  renderMaterialMaster();
  renderHistory();
 }catch(e){msg("通信エラー："+e.message,"error")}
}
function showPage(p){
 document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
 document.getElementById(p+"Page").classList.add("active");
 document.querySelectorAll(".nav").forEach(e=>e.classList.toggle("active",e.dataset.page===p));
 if(p==="manage")renderManage();
 if(p==="setup")renderSetup();
 if(p==="add")renderMaterialMaster();
 if(p==="history")renderHistory();
}
function fillSelects(){
 ["truck","fromTruck","toTruck"].forEach(id=>document.getElementById(id).innerHTML=trucks.map(t=>`<option>${t}</option>`).join(""));
 document.getElementById("historyTruck").innerHTML='<option value="">すべて</option>'+trucks.map(t=>`<option>${t}</option>`).join("");
 document.getElementById("transferMaterial").innerHTML=materials.map(m=>`<option>${m}</option>`).join("");
 document.getElementById("historyMaterial").innerHTML='<option value="">すべて</option>'+materials.map(m=>`<option>${m}</option>`).join("");
 document.getElementById("setupButtons").innerHTML=trucks.map(t=>`<button class="${t===setupTruck?"primary":"secondary"}" onclick="selectSetup('${t}')">🚚 ${t}</button>`).join("");
}
function listFor(t){return cloudData[t]||materials.map(m=>({material:m,quantity:0,note:""}))}
function renderHome(){
 document.getElementById("truckCards").innerHTML=trucks.map(t=>{
  const total=listFor(t).reduce((s,x)=>s+(Number(x.quantity)||0),0);
  return `<div class="card truck-card" onclick="document.getElementById('truck').value='${t}';showPage('manage')"><h3>🚚 ${t}</h3><div class="total">${total}</div><small>資材合計</small></div>`;
 }).join("");
}
function renderManage(){
 const t=document.getElementById("truck").value||trucks[0];
 document.getElementById("manageTitle").textContent=t+" 資材管理点検票";
 document.getElementById("manageBody").innerHTML=listFor(t).map(x=>`<tr>
 <td>${x.material}</td><td class="qty">${x.quantity}</td>
 <td class="actions no-print"><button class="plus" onclick="changeQty('${x.material}',1)">＋</button><button class="minus" onclick="changeQty('${x.material}',-1)">－</button></td>
 <td><input value="${esc(x.note)}" onchange="saveExact('${x.material}',${x.quantity},this.value)"></td></tr>`).join("");
}
async function changeQty(material,dir){
 const t=document.getElementById("truck").value,staff=document.getElementById("staff").value||"未入力";
 const item=listFor(t).find(x=>x.material===material),next=Math.max(0,(Number(item.quantity)||0)+dir);
 try{await apiPost({action:"updateMaterial",truck:t,material,quantity:next,note:item.note||"",staff});msg("数量を更新しました");await refresh()}catch(e){msg(e.message,"error")}
}
async function saveExact(material,quantity,note){
 const t=document.getElementById("truck").value,staff=document.getElementById("staff").value||"未入力";
 try{await apiPost({action:"updateMaterial",truck:t,material,quantity,note,staff});msg("備考を保存しました");await refresh()}catch(e){msg(e.message,"error")}
}
async function transfer(){
 const payload={action:"transferMaterial",fromTruck:fromTruck.value,toTruck:toTruck.value,material:transferMaterial.value,quantity:Number(transferQty.value),staff:transferStaff.value||"未入力",note:transferNote.value||""};
 try{await apiPost(payload);msg("資材を移動しました");await refresh()}catch(e){msg(e.message,"error")}
}
function selectSetup(t){setupTruck=t;fillSelects();renderSetup()}
function renderSetup(){
 document.getElementById("setupTitle").textContent=setupTruck+" 初期数入力";
 document.getElementById("setupBody").innerHTML=listFor(setupTruck).map(x=>`<tr><td>${x.material}</td><td><input type="number" min="0" id="q_${x.material}" value="${x.quantity}"
onfocus="if(this.value==='0'){this.value='';}else{this.select();}"
onblur="if(this.value===''){this.value='0';}"></td><td><input id="n_${x.material}" value="${esc(x.note)}"></td></tr>`).join("");
}
async function saveSetup(){
 const items=materials.map(m=>({material:m,quantity:Number(document.getElementById("q_"+m).value)||0,note:document.getElementById("n_"+m).value||""}));
 try{await apiPost({action:"saveTruck",truck:setupTruck,items,staff:"初期設定"});msg(setupTruck+"を保存しました");await refresh()}catch(e){msg(e.message,"error")}
}

async function addMaterial(){
 const material=document.getElementById("newMaterial").value.trim();
 if(!material){msg("資材名を入力してください","error");return;}
 if(!confirm(`「${material}」を全号車へ追加しますか？`))return;
 try{
  await apiPost({
   action:"addMaterial",
   material:material,
   initialQuantity:Number(document.getElementById("newInitialQty").value)||0,
   note:document.getElementById("newMaterialNote").value||"",
   staff:document.getElementById("newMaterialStaff").value||"未入力"
  });
  document.getElementById("newMaterial").value="";
  document.getElementById("newInitialQty").value="0";
  document.getElementById("newMaterialNote").value="";
  msg("資材を追加しました");
  await refresh();
 }catch(e){msg(e.message,"error");}
}


function renderMaterialMaster(){
 const body=document.getElementById("materialMasterBody");
 if(!body)return;
 body.innerHTML=materials.length
  ? materials.map(m=>`<tr>
      <td>${esc(m)}</td>
      <td><button class="minus" onclick="deleteMaterial('${String(m).replaceAll("\\","\\\\").replaceAll("'","\\'")}')">削除</button></td>
    </tr>`).join("")
  : '<tr><td colspan="2">資材が登録されていません</td></tr>';
}

async function deleteMaterial(material){
 const staff=document.getElementById("newMaterialStaff").value||prompt("削除する担当者名を入力してください。","")||"未入力";
 const first=confirm(`「${material}」を削除しますか？\n\n全号車の一覧と資材マスタから削除されます。`);
 if(!first)return;
 const second=confirm(`最終確認です。\n「${material}」の数量・備考も全号車から削除されます。\n元に戻せません。実行しますか？`);
 if(!second)return;

 try{
  await apiPost({
   action:"deleteMaterial",
   material:material,
   staff:staff
  });
  msg("資材を削除しました");
  await refresh();
 }catch(e){msg(e.message,"error");}
}

function renderHistory(){
 const tf=historyTruck.value,mf=historyMaterial.value;
 const h=historyData.filter(x=>(!tf||String(x.truck).includes(tf))&&(!mf||x.material===mf));
 document.getElementById("historyList").innerHTML=h.length
  ? h.map(x=>`<div class="history-item">
      <label style="display:flex;gap:10px;align-items:flex-start">
        <input type="checkbox" class="historyCheck" value="${x.rowNumber}" style="width:auto;margin-top:3px">
        <span>
          <strong>${x.type}｜${x.truck}｜${x.material}</strong><br>
          ${x.before} → ${x.after}${x.note?"｜"+esc(x.note):""}<br>
          <small>${x.date} ${x.time}｜担当：${esc(x.staff)}</small>
        </span>
      </label>
    </div>`).join("")
  : "履歴はありません";
}

async function deleteSelectedHistory(){
 const rows=Array.from(document.querySelectorAll(".historyCheck:checked"))
  .map(el=>Number(el.value));

 if(rows.length===0){
  msg("削除する履歴を選択してください","error");
  return;
 }

 if(!confirm(`選択した${rows.length}件の履歴を削除しますか？`))return;

 try{
  await apiPost({
   action:"deleteHistoryRows",
   rowNumbers:rows
  });
  msg("選択した履歴を削除しました");
  await refresh();
 }catch(e){msg(e.message,"error");}
}

async function clearAllHistory(){
 const first=confirm("履歴をすべて削除しますか？");
 if(!first)return;
 const second=confirm("最終確認です。履歴は元に戻せません。本当に削除しますか？");
 if(!second)return;

 try{
  await apiPost({action:"clearHistory"});
  msg("履歴をすべて削除しました");
  await refresh();
 }catch(e){msg(e.message,"error");}
}

document.getElementById("date").value=today();
fillSelects();
document.getElementById("truck").addEventListener("change",renderManage);
refresh();
</script>
</body>
</html>
